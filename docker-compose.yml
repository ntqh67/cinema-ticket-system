version: '3.9'

# Khởi chạy hai dịch vụ hạ tầng cục bộ: PostgreSQL là nguồn dữ liệu chính và Redis chỉ giữ ghế tạm thời.
services:
  # Cơ sở dữ liệu bền vững chứa phim, rạp, suất chiếu, booking, thanh toán và vé.
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cinema_ticket_system
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis lưu khóa giữ ghế có TTL; ghế chỉ chuyển BOOKED trong PostgreSQL sau khi thanh toán thành công.
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

# Volume giúp dữ liệu PostgreSQL không mất khi container được tạo lại.
volumes:
  postgres_data:
  redis_data:
