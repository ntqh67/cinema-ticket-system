<!DOCTYPE html>
<!--
  Tài liệu gốc của ứng dụng SPA CineTicket.
  Các khối script được nạp theo thứ tự tiện ích, thành phần dùng chung, module MVC rồi mới khởi chạy ứng dụng.
-->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRTicket - Hệ Thống Bán Vé Rạp Chiếu Phim</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages/home.css" />
  <link rel="stylesheet" href="assets/css/pages/auth.css" />
  <link rel="stylesheet" href="assets/css/pages/movies.css" />
  <link rel="stylesheet" href="assets/css/pages/booking.css" />
  <link rel="stylesheet" href="assets/css/pages/seats.css" />
  <link rel="stylesheet" href="assets/css/pages/payment.css" />
  <link rel="stylesheet" href="assets/css/pages/ticket.css" />
  <link rel="stylesheet" href="assets/css/pages/admin.css" />
  <link rel="stylesheet" href="assets/css/pages/dashboard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div id="app">
    <!-- Thanh điều hướng chính -->
    <nav id="navbar"></nav>
    <!-- Nội dung của trang hiện tại được router gắn vào đây -->
    <main id="main-content"></main>
    <!-- Chân trang dùng chung -->
    <footer id="footer"></footer>
    <!-- Vùng chứa hộp thoại dùng chung -->
    <div id="modal-container"></div>
    <!-- Vùng chứa thông báo nhanh -->
    <div id="toast-container"></div>
  </div>

  <!-- Nạp các tiện ích nền tảng trước những module nghiệp vụ -->
  <script src="assets/js/utils/helpers.js"></script>
  <script src="assets/js/utils/state.js"></script>
  <script src="assets/js/utils/api.js"></script>
  <script src="assets/js/utils/qr.js"></script>
  <script src="assets/js/utils/router.js"></script>

  <!-- Các thành phần giao diện dùng chung -->
  <script src="assets/js/components/Toast.js"></script>
  <script src="assets/js/components/Modal.js"></script>
  <script src="assets/js/components/Navbar.js"></script>
  <script src="assets/js/components/Footer.js"></script>

  <!-- Module xác thực -->
  <script src="auth/models/AuthModel.js"></script>
  <script src="auth/controllers/AuthController.js"></script>
  <script src="auth/views/AuthView.js"></script>

  <!-- Module người dùng -->
  <script src="users/models/UserModel.js"></script>
  <script src="users/controllers/UserController.js"></script>
  <script src="users/views/UserView.js"></script>

  <!-- Module phim -->
  <script src="movies/models/MovieModel.js"></script>
  <script src="movies/controllers/MovieController.js"></script>
  <script src="movies/views/MovieView.js"></script>

  <!-- Module cụm rạp -->
  <script src="cinemas/models/CinemaModel.js"></script>
  <script src="cinemas/controllers/CinemaController.js"></script>
  <script src="cinemas/views/CinemaView.js"></script>

  <!-- Module phòng chiếu -->
  <script src="rooms/models/RoomModel.js"></script>
  <script src="rooms/controllers/RoomController.js"></script>
  <script src="rooms/views/RoomView.js"></script>

  <!-- Module ghế -->
  <script src="seats/models/SeatModel.js"></script>
  <script src="seats/controllers/SeatController.js"></script>
  <script src="seats/views/SeatView.js"></script>

  <!-- Module suất chiếu -->
  <script src="showtimes/models/ShowtimeModel.js"></script>
  <script src="showtimes/controllers/ShowtimeController.js"></script>
  <script src="showtimes/views/ShowtimeView.js"></script>

  <!-- Module đặt vé -->
  <script src="bookings/models/BookingModel.js"></script>
  <script src="bookings/controllers/BookingController.js"></script>
  <script src="bookings/views/BookingView.js"></script>

  <!-- Module thanh toán -->
  <script src="payments/models/PaymentModel.js"></script>
  <script src="payments/controllers/PaymentController.js"></script>
  <script src="payments/views/PaymentView.js"></script>

  <!-- Module vé điện tử -->
  <script src="tickets/models/TicketModel.js"></script>
  <script src="tickets/controllers/TicketController.js"></script>
  <script src="tickets/views/TicketView.js"></script>

  <!-- Module combo bắp nước -->
  <script src="concessions/controllers/ConcessionController.js"></script>
  <script src="concessions/views/ConcessionView.js"></script>

  <!-- Module báo cáo -->
  <script src="reports/models/ReportModel.js"></script>
  <script src="reports/controllers/ReportController.js"></script>
  <script src="reports/views/ReportView.js"></script>

  <!-- Điểm khởi chạy ứng dụng; phải được nạp sau mọi phụ thuộc -->
  <script src="assets/js/app.js"></script>
</body>
</html>
